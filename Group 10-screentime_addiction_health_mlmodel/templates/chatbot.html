<!DOCTYPE html>
<html>

<head>

<title>Digital Health AI Chatbot</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:0;
}

.container{
width:750px;
margin:auto;
margin-top:40px;
}

.chatbox{
background:white;
height:500px;
overflow-y:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.message{
display:flex;
margin-bottom:15px;
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.bubble{
padding:12px 15px;
border-radius:15px;
max-width:60%;
font-size:14px;
line-height:1.5;
}

.user .bubble{
background:#1a73e8;
color:white;
}

.bot .bubble{
background:#e4e6eb;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
margin:0 8px;
}

form{
margin-top:15px;
display:flex;
}

input{
flex:1;
padding:12px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:12px 18px;
margin-left:6px;
border:none;
border-radius:5px;
cursor:pointer;
background:#1a73e8;
color:white;
}

.clearbtn{
background:#e53935;
}

.typing{
font-style:italic;
color:gray;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Digital Wellbeing Chatbot</h2>

<div class="chatbox" id="chatbox">

{% for msg in chat_history %}

<div class="message user">
<div class="bubble">
{{msg.user}}
</div>
</div>

<div class="message bot">
<div class="bubble">
{{msg.bot}}
</div>
</div>

{% endfor %}

</div>

<form method="POST" onsubmit="showTyping()">

<input type="text" name="question" placeholder="Ask about screen time, sleep, productivity..." required>

<button type="submit">Send</button>

<button class="clearbtn" name="clear">Clear</button>

</form>

</div>

<script>

function showTyping(){
let chatbox = document.getElementById("chatbox")

let typing = document.createElement("div")
typing.className = "message bot typing"
typing.innerHTML = "<div class='bubble'>AI is thinking...</div>"

chatbox.appendChild(typing)
}

let chatbox = document.getElementById("chatbox")
chatbox.scrollTop = chatbox.scrollHeight

</script>

</body>

</html>
