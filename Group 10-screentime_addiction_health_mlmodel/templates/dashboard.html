<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}

.container{
width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

table,th,td{
border:1px solid #ddd;
}

th,td{
padding:10px;
text-align:center;
}

th{
background:#4CAF50;
color:white;
}

button{
padding:10px 20px;
margin-top:20px;
background:#4CAF50;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

</style>

</head>

<body>

<div class="container">

<h1>Digital Addiction Dashboard</h1>

<a href="/prediction"><button>New Prediction</button></a>
<a href="/chatbot"><button>AI Chatbot</button></a>
<a href="/logout"><button>Logout</button></a>
<h2>Prediction History</h2>

<table>

<tr>
<th>Addiction Score</th>
<th>Addiction Level</th>
<th>Health Risk</th>
</tr>

{% for row in rows %}

<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
</tr>

{% endfor %}

</table>

<h2>Score Graph</h2>

<canvas id="scoreChart"></canvas>

</div>

<script>

let scores = {{ scores | tojson }};

let labels = [];

for(let i=0;i<scores.length;i++){
labels.push("Test "+(i+1));
}

const ctx = document.getElementById('scoreChart');

new Chart(ctx,{

type:'line',

data:{
labels:labels,

datasets:[{

label:'Addiction Score',

data:scores,

borderWidth:3,

fill:false

}]

},

options:{
responsive:true,
plugins:{
legend:{
display:true
}
},
scales:{
y:{
beginAtZero:true
}
}
}

});

</script>

</body>
</html>
