<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{
font-family:"Segoe UI", Arial;
background: linear-gradient(135deg,#eef2f3,#dfe9f3);
margin:0;
padding:0;
}

/* Container Card */

.container{
width:400px;
margin:auto;
margin-top:120px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

/* Title */

h2{
text-align:center;
color:#333;
margin-bottom:25px;
}

/* Input fields */

input{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

/* Button */

button{
width:100%;
padding:12px;
background:#007BFF;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0056b3;
}

/* Signup link */

.signup{
text-align:center;
margin-top:15px;
}

.signup a{
color:#007BFF;
text-decoration:none;
font-weight:600;
}

.signup a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<form action="/login" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="signup">
Don't have an account? <a href="/signup">Sign Up</a>
</div>

</div>

</body>
</html>
