<!DOCTYPE html>
<html>
<head>
    <title>Live Election Standings</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; max-width: 600px; width: 100%; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Live Election Standings</h1>
        <p>Real-time results fetched directly from the blockchain ledger.</p>
        <canvas id="voterChart"></canvas>
        <br>
        <a href="/dashboard" style="text-decoration: none; color: #007bff; font-weight: bold;">← Back to Dashboard</a>
    </div>

    <script>
        let voterChart;
        async function updateChart() {
            const res = await fetch('/api/public_results');
            const data = await res.json();
            const labels = Object.keys(data);
            const values = Object.values(data);

            if (!voterChart) {
                const ctx = document.getElementById('voterChart').getContext('2d');
                voterChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{ label: 'Votes', data: values, backgroundColor: '#28a745' }]
                    },
                    options: { animation: false }
                });
            } else {
                voterChart.data.labels = labels;
                voterChart.data.datasets[0].data = values;
                voterChart.update();
            }
        }
        setInterval(updateChart, 3000);
        updateChart();
    </script>
</body>
</html>
